# CODEX_QUALITY_HARNESS_FILE v1.0.1
name: weekly-health-check

on:
  workflow_dispatch:
  schedule:
    - cron: '0 3 * * 1'

permissions:
  contents: read

jobs:
  health-check:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install root dependencies if present
        shell: bash
        run: |
          set -euo pipefail
          if [ -f package.json ]; then
            npm install --no-package-lock
          fi
      - name: Run source/core health gate
        shell: bash
        env:
          CODEX_HARNESS_SOURCE_REPO: "1"
          CODEX_HARNESS_MODE: "core"
          CODEX_PROFILE_COMPAT_MODE: "optional"
          CODEX_REQUIRE_NPM: "1"
          CODEX_QUALITY_REPORT: "json"
          CODEX_EVENT_NAME: ${{ github.event_name }}
        run: |
          set -euo pipefail
          node scripts/codex-workflow-preflight.mjs > "$RUNNER_TEMP/codex-workflow-preflight.json"
          node scripts/codex-local-quality-gate.mjs > "$RUNNER_TEMP/codex-weekly-health.json"
          node scripts/codex-workflow-preflight.mjs --write-artifact > "$RUNNER_TEMP/codex-workflow-preflight-artifact.json"
          node scripts/codex-workflow-quality-runner.mjs --report "$RUNNER_TEMP/codex-weekly-health.json" --gate-exit 0
